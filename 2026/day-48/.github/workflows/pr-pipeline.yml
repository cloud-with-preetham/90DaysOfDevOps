name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.12"
      run_tests: true

  dependency-review:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Check Dependencies for Vulnerabilities
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  pr-commit:
    needs: [build-test, dependency-review]
    runs-on: ubuntu-latest

    steps:
      - name: PR Summary
        run: |
          echo "PR checks passed for branch: ${{ github.head_ref }}"
