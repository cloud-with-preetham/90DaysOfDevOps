kind: Pod
apiVersion: v1
metadata:
  name: liveness-pod
spec:
  containers:
    - name: busybox
      image: busybox:latest
      args: ["/bin/sh", "-c", "touch /tmp/healthy; sleep 30; rm -f /tmp/healthy; sleep 600"]
      livenessProbe:
        exec:
          command: ["cat", "/tmp/healthy"]
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
