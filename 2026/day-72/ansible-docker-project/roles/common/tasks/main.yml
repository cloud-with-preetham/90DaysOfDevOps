# tasks file for roles/common

---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: common 

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present
  tags: common

- name: Set timezone
  timezone:
    name: "{{ timezone }}"
  tags: common

- name: Create deploy user
  user:
    name: deploy
    groups: sudo
    shell: /bin/bash
    state: present
  tags: common
