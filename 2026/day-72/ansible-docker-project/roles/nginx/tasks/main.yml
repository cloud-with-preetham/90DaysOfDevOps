---
# tasks file for roles/nginx

- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  tags: nginx

- name: Remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  tags: nginx

- name: Deploy reverse proxy config
  template:
    src: app-proxy.conf.j2
    dest: /etc/nginx/sites-available/app-proxy.conf
  notify: Reload Nginx
  tags: nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/app-proxy.conf
    dest: /etc/nginx/sites-enabled/app-proxy.conf
    state: link
  notify: Reload Nginx
  tags: nginx

- name: Test Nginx config
  command: nginx -t
  changed_when: false
  tags: nginx

- name: Start Nginx
  service:
    name: nginx
    state: started
    enabled: true
  tags: nginx
